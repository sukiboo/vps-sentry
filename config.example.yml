# When deployed via deploy/install.sh, vps-sentry lives at /opt/vps-sentry:
#   config      /opt/vps-sentry/config.yml
#   secrets     /opt/vps-sentry/.env
#   tick log    /opt/vps-sentry/logs/vps-sentry.log    (daily rotation, 60d)
#   event log   journalctl -u vps-sentry -f
#   service     systemctl {status,restart} vps-sentry

# How often to sample system metrics (seconds).
interval_seconds: 60
# Number of consecutive breaching snapshots required before an alert fires.
sustained_checks: 3
# How long to suppress the same (metric, tier) alert after firing (minutes).
cooldown_minutes: 30
# How many top processes (by CPU and by RAM) to include in each alert.
show_top_n_proc: 5

# Optional override; defaults to socket.gethostname()
# host: my-vps

thresholds:
  load_per_core: { warn: 1.0, critical: 2.0 }
  memory_used:   { warn: 80,  critical: 90 }
  swap_used:     { warn: 10,  critical: 50 }
  disk_used:     { warn: 80,  critical: 90 }
  iowait:        { warn: 20,  critical: 40 }

mounts: ["/"]

# Weekly summary of avg/max/p95 resource usage over the past 7 days.
# Fires on the configured day/hour/minute (UTC) and posts to the same Telegram channel.
weekly_report:
  enabled: true
  day: sunday        # sun/mon/.../sat (case-insensitive) or 0-6 (Mon=0..Sun=6)
  hour: 0
  minute: 0
